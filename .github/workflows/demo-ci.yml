name: Demo CI

on:
  push:
    paths:
      - 'backend-worker/**'
      - 'backend-spring/**'
      - '.github/workflows/**'
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Run backend-worker tests
        run: mvn -f backend-worker/pom.xml -B test
      - name: Run backend-spring tests
        run: mvn -f backend-spring/pom.xml -B test
